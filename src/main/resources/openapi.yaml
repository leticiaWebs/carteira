openapi: 3.0.3
info:
  title: Banco Digital API
  version: 1.0.0
  description: API para gerenciamento de contas

servers:
  - url: http://localhost:8080

paths:
  /conta:
    post:
      tags:
        - conta
      summary: Criar conta
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '201':
          description: Conta criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
    get:
      tags:
        - conta
      summary: Listar contas
      operationId: findAllAccounts
      responses:
        '200':
          description: Lista de contas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'

  /conta/{id}:
    get:
      tags:
        - conta
      summary: Buscar conta por ID
      operationId: findAccountById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          description: Conta não encontrada

    put:
      tags:
        - conta
      summary: Atualizar conta
      operationId: updateAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '200':
          description: Conta atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

    delete:
      tags:
        - conta
      summary: Deletar conta
      operationId: deleteAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Conta deletada com sucesso

  /conta/{id}/deposito:
    put:
      tags:
        - conta
      summary: Depositar dinheiro
      operationId: depositMoney
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Deposit'
      responses:
        '200':
          description: Depósito realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

  /conta/{id}/sacar:
    put:
      tags:
        - conta
      summary: Sacar dinheiro
      operationId: withdrawMoney
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Withdraw'
      responses:
        '200':
          description: Saque realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

  /conta/{id}/balance:
    get:
      tags:
        - conta
      summary: Consultar saldo
      operationId: getAccountBalance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Saldo da conta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

components:
  schemas:
    AccountRequest:
      type: object
      description: Dados para criar ou atualizar uma conta
      required:
        - accountNumber
        - agencyNumber
        - customer
      properties:
        accountNumber:
          type: string
          example: "123456"
        agencyNumber:
          type: string
          example: "0001"
        customer:
          $ref: '#/components/schemas/Customer'
    AccountResponse:
      type: object
      description: Dados de retorno de uma conta bancária
      properties:
        id:
          type: integer
          format: int64
          example: 1
        accountNumber:
          type: string
          example: "123456"
        agencyNumber:
          type: string
          example: "0001"
        balance:
          type: number
          format: double
          example: 1500.75
        createdAt:
          type: string
          format: date-time
          example: "2026-03-10T19:45:00"

    Customer:
      type: object
      properties:
        document:
          type: string
          example: "123.456.789-00"
        name:
          type: string
          example: "Maria Silva"

    Deposit:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          format: BigDecimal
          example: 1500.75

    Withdraw:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          format: BigDecimal
          example: 500.00

    BankStatementRepresentation:
      type: object
      properties:
        id:
          type: string
          description: Identificador único do lançamento
          example: "1"
        operationType:
          type: string
          description: Tipo da operação realizada
          example: "DEPOSITO"
        value:
          type: number
          format: BigDecimal
          description: Valor da operação
          example: 150.00
        dateTime:
          type: string
          format: date-time
          description: Data e hora da operação
          example: "2024-01-15T10:30:00"
        operationDescription:
          type: string
          description: Descrição detalhada da operação
          example: "Depósito via PIX"
        account:
          $ref: '#/components/schemas/AccountResponse'
          description: Conta associada ao lançamento